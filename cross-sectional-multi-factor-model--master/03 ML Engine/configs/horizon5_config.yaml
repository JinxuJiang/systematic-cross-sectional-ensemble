# Alpha Combiner 5日预测模型配置 (V1修复版)
# 针对短期预测(5天)的高噪声特性，使用Huber损失和强正则化

# ==================== 数据配置 ====================
data:
  factor_paths:
    technical: "02因子库/processed_data/factors/technical"
    financial: "02因子库/processed_data/factors/financial"
  market_data_path: "02因子库/processed_data/market_data"
  price_column: "close"
  open_column: "open"  # V1新增：开盘价字段
  
  label:
    horizon: 5  # 预测未来5日收益率
    formula: "forward_return"
    use_open_price: true  # V1新增：使用开盘价计算标签

# ==================== Walk-forward 配置 ====================
walk_forward:
  train_window: "3Y"
  valid_window: "6M"
  test_window: "3M"
  step: "3M"
  start_date: "2010-01-01"
  end_date: null
  
  # V1新增：双重Gap防止数据泄露
  gap_train_valid: 6   # 5+1 = 6个交易日
  gap_valid_test: 6    # 5+1 = 6个交易日

# ==================== LightGBM 5日模型配置 ====================
# 针对短期预测的高噪声特性：
# - Huber损失：对极端收益不敏感
# - 极小学习率 + 浅树：防止过拟合
# - 大min_data_in_leaf：每叶子至少1500只股票，非常保守
model:
  name: "lightgbm"
  params:
    objective: "huber"           # 对短期极端收益不敏感 (核心差异)
    metric: "huber"
    learning_rate: 0.01          # 极小学习率
    max_depth: 5                 # 极浅的树
    num_leaves: 20               # 叶子节点极少
    min_data_in_leaf: 500       # 每个叶子必须包含大量股票 (强正则)
    feature_fraction: 0.5        # 每次只用50%的因子 (列采样)
    bagging_fraction: 0.8        # 行采样
    bagging_freq: 1              # 每轮都采样
    lambda_l1: 0.1               # L1正则
    lambda_l2: 1.0               # L2正则
    verbose: -1
    num_threads: 8
    n_estimators: 1000           # 更多树，早停控制
    early_stopping_rounds: 100   # 更保守的早停
  random_state: 42

# ==================== 训练配置 ====================
training:
  save_models: true
  save_feature_importance: true
  log_level: "INFO"

# ==================== 输出配置 ====================
output:
  experiments_dir: "03模型训练层/experiments"
  model_filename: "model_fold_{fold_id:03d}.pkl"
  importance_filename: "importance_fold_{fold_id:03d}.csv"
  predictions_filename: "predictions.parquet"
