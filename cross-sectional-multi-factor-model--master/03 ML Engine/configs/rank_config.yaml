# Alpha Combiner - LambdaRank 排序学习配置
# 模型训练层 - LightGBM LambdaRank 截面排序模型
# 
# 与 default_config.yaml 的区别：
# 1. objective: lambdarank (替代 regression)
# 2. 针对 A 股优化了防过拟合参数
# 3. 直接优化股票排名，解决预测值扎堆问题

# ==================== 数据配置 ====================
data:
  # 因子数据路径（相对于项目根目录）
  factor_paths:
    technical: "02因子库/processed_data/factors/technical"
    financial: "02因子库/processed_data/factors/financial"
  
  # 行情数据路径（用于计算标签）
  market_data_path: "02因子库/processed_data/market_data"
  
  # 使用的行情字段
  price_column: "close"
  open_column: "open"
  
  # 预测目标配置
  label:
    horizon: 20  # 预测未来20日收益率
    use_open_price: true  # V1版本：使用真实交易时点

# ==================== Walk-forward 配置 ====================
walk_forward:
  train_window: "3Y"    # 训练窗口：3年
  valid_window: "6M"    # 验证窗口：6个月（用于早停）
  test_window: "3M"     # 测试窗口：3个月
  step: "3M"            # 步长：每3个月滚动一次
  
  # 数据范围限制（可选）
  start_date: "2010-01-01"  # 训练开始日期
  end_date: null            # 训练结束日期（null表示到最新数据）
  
  # V1版本：双重Gap防止数据泄露
  gap_train_valid: 21  # 训练-验证间隔（交易日）
  gap_valid_test: 21   # 验证-测试间隔（交易日）

# ==================== LightGBM LambdaRank 模型配置 ====================
model:
  name: "lightgbm_rank"    # 模型标识（用于日志和区分）
  
  params:
    # === 1. 核心任务设置（与回归模型的区别）===
    objective: "lambdarank"    # 排序学习目标（替代 regression）
    metric: "ndcg"             # 评估指标：NDCG (归一化折损累计增益)
    ndcg_eval_at: [10, 30, 50] # 评估模型把优质股票排在前10/30/50名的能力
    
    # === 2. 树的生长控制（A股防过拟合核心）===
    boosting_type: "gbdt"
    max_depth: 5               # 关键：A股极易过拟合，树深度严格限制 4~6
    num_leaves: 31             # 配合 max_depth，通常 <= 2^max_depth
    min_data_in_leaf: 150      # 关键：每叶子最少150只股票，防止妖股带偏
    
    # === 3. 学习节奏（慢工出细活）===
    learning_rate: 0.015       # 关键：从 0.05 降低，信噪比低需要更保守
    n_estimators: 1500         # 学习率降低，树数量增加，让分数更平滑
    
    # === 4. 随机抽样（增加鲁棒性）===
    feature_fraction: 0.7      # 每次建树只随机抽70%因子，防止过度依赖强因子
    bagging_fraction: 0.8      # 每次建树只随机抽80%股票样本
    bagging_freq: 5            # 每5轮迭代执行一次bagging
    
    # === 5. 正则化（A股必备，惩罚极端权重）===
    lambda_l1: 0.5             # L1正则：让无用因子权重归零
    lambda_l2: 1.0             # L2正则：防止单个因子权重过大
    
    # === 6. 工程设置 ===
    verbose: -1
    num_threads: 8
    early_stopping_rounds: 50  # 容忍50轮没进步才早停，防止局部震荡误退出
  
  # 随机种子（保证可复现）
  random_state: 42

# ==================== 训练配置 ====================
training:
  # 是否保存每个fold的模型
  save_models: true
  
  # 是否保存特征重要性
  save_feature_importance: true
  
  # 日志级别
  log_level: "INFO"

# ==================== 输出配置 ====================
output:
  # 实验输出根目录
  experiments_dir: "03模型训练层/experiments"
  
  # 文件命名格式
  model_filename: "model_fold_{fold_id:03d}.pkl"
  importance_filename: "importance_fold_{fold_id:03d}.csv"
  predictions_filename: "predictions.parquet"
